name: CI

on:
  push:
  pull_request:
  schedule:
    # Weekly Friday 5AM build
    # * is a special character in YAML so you have to quote this string
    - cron: '0 5 * * 5'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pep8:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
      with:
        python-version: '3.x'
    - name: Lint with ruff
      run: |
        python -m pip install --upgrade pip ruff
        ruff check astrowidgets

  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
      with:
        python-version: '3.12'
    - name: Install and build
      run: python -m pip install tox --upgrade
    - name: Run tests
      run: tox -e py312-test

  devtests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
      with:
        python-version: '3.13'
    - name: Install and build
      run: python -m pip install tox --upgrade
    - name: Run tests
      run: tox -e py313-test-devdeps

  pixi:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
    - name: Set up pixi
      uses: prefix-dev/setup-pixi@v0.10.0
      with:
        run-install: false
    - name: Set up pixi environment
      run: pixi install
    - name: Verify install
      run: pixi run python -c "import astrowidgets"
    - name: Run tests (pixi)
      run: pixi run test

  pixi-downstream:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
    - name: Set up pixi
      uses: prefix-dev/setup-pixi@v0.10.0
      with:
        run-install: false
    - name: Create downstream project
      run: |
        mkdir downstream && cd downstream
        pixi init
    - name: Add dependencies (simulate user env)
      working-directory: downstream
      run: pixi add numpy scipy astropy ipywidgets
    - name: Add local package (Unix)
      if: runner.os != 'Windows'
      working-directory: downstream
      run: pixi add --pypi "astrowidgets @ file://$GITHUB_WORKSPACE"
    - name: Add local package (Windows)
      if: runner.os == 'Windows'
      working-directory: downstream
      shell: pwsh
      run: |
        $path = $env:GITHUB_WORKSPACE -replace '\\','/'
        pixi add --pypi ("astrowidgets @ file:///" + $path)
    - name: Install and verify
      working-directory: downstream
      run: |
        pixi install
        pixi run python -c "import astrowidgets"
