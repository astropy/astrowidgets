name: CI

on:
  push:
  pull_request:
  schedule:
    # Weekly Friday 5AM build
    # * is a special character in YAML so you have to quote this string
    - cron: '0 5 * * 5'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pep8:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.x'
    - name: Lint with ruff
      run: |
        python -m pip install --upgrade pip ruff
        ruff check astrowidgets

  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.12'
    - name: Install and build
      run: python -m pip install tox --upgrade
    - name: Run tests
      run: tox -e py312-test

  devtests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.13'
    - name: Install and build
      run: python -m pip install tox --upgrade
    - name: Run tests
      run: tox -e py313-test-devdeps

  pixi:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Install pixi
      run: |
        curl -fsSL https://pixi.sh/install.sh | bash
        echo "$HOME/.pixi/bin" >> $GITHUB_PATH
    - name: Set up pixi environment
      run: pixi install
    - name: Verify install
      run: pixi run python -c "import astrowidgets"
    - name: Run tests (pixi)
      run: pixi run test

  pixi-downstream:
    runs-on: ubuntu-latest
    steps:
    - name: Install pixi
      run: |
        curl -fsSL https://pixi.sh/install.sh | bash
        echo "$HOME/.pixi/bin" >> $GITHUB_PATH
    - name: Create downstream project
      run: |
        mkdir downstream && cd downstream
        pixi init
    - name: Add dependencies (simulate user env)
      working-directory: downstream
      run: |
        pixi add numpy scipy astropy ipywidgets
        pixi add --pypi "astrowidgets @ file://$GITHUB_WORKSPACE"
    - name: Install and verify
      working-directory: downstream
      run: |
        pixi install
        pixi run python -c "import astrowidgets"
